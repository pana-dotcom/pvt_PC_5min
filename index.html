<!DOCTYPE html>
<html lang="ja">
<title>PVT 反応時間テスト</title><head>
<style>
body {
    text-align: center;
    font-family: Arial;
    margin-top: 100px;
}
#box {
    width: 300px;
    height: 200px;
    background: gray;
    margin: auto;
    line-height: 200px;
    font-size: 40px;
    color: white;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
}

#box.waiting {
    font-size: 80px;
}

button{
    margin-top:20px;
    font-size:18px;
    padding:10px 20px;
}

.instruction {
    font-size: 40px;
    font-weight: bold;
}
</style>
</head>
<body>

<p class="instruction">赤になったらすぐEnterキー！</p>

<button id="startBtn">テスト開始</button>

<div id="box" class="waiting">✖</div>

<script>
let testDuration = 270000; // 
let testStartTime;

let startTime;
let waiting = false;
let isRunning = false;

let results = [];

const box = document.getElementById("box");
const startBtn = document.getElementById("startBtn");

// ✅ キー連打防止
let keyLocked = false;

// スタート
startBtn.addEventListener("click", () => {
    results = [];
    isRunning = true;
    testStartTime = Date.now();
    startBtn.disabled = true;

    if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen();
    }

    startTest();
});

function startTest(){
    box.style.background = "gray";
    box.classList.add("waiting");
    box.textContent = "✖";
    waiting = true;

    let delay = Math.random() * 8000 + 2000;

    setTimeout(() => {
        if (!isRunning) return;

        requestAnimationFrame(() => {
            box.style.background = "red";
            box.classList.remove("waiting");
            box.textContent = "Enter！";
            startTime = performance.now();
            waiting = false;
        });

    }, delay);
}

// ✅ Enterキー処理
document.addEventListener("keydown", (e) => {
    if (e.key !== "Enter") return;

    // 長押し防止
    if (keyLocked) return;
    keyLocked = true;

    handleResponse();
});

document.addEventListener("keyup", (e) => {
    if (e.key === "Enter") {
        keyLocked = false;
    }
});

// ✅ 共通処理
function handleResponse() {
    if (!isRunning) return;
    if (waiting) return; // フライング無視

    let endTime = performance.now();
    let reaction = Math.round(endTime - startTime);

    results.push(reaction);

    if (Date.now() - testStartTime >= testDuration) {
        endTest();
        return;
    }

    startTest();
}

// ✅ テスト終了
function endTest() {
    isRunning = false;
    startBtn.disabled = false;
    downloadCSV();
}

// ✅ CSV出力
function downloadCSV() {
    let now = new Date();

    let fileName =
        now.getFullYear() +
        (now.getMonth()+1).toString().padStart(2,"0") +
        now.getDate().toString().padStart(2,"0") + "_" +
        now.getHours().toString().padStart(2,"0") +
        now.getMinutes().toString().padStart(2,"0");

    let csv = "trial,reaction_time_ms,lapse\n";

    results.forEach((time, index) => {
        let lapse = 0;

        if (time >= 500) {
            lapse = 1;
        }

        csv += (index + 1) + "," + time + "," + lapse + "\n";
    });

    let blob = new Blob([csv], { type: "text/csv" });

    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "pvt_" + fileName + ".csv";

    link.click();
}
</script>

</body>
</html>
<meta charset="UTF-8">
